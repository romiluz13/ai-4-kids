<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>המשחק שלי</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
      padding: 2rem;
    }
    h1 { color: #4361ee; }
    p { max-width: 28rem; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>ברוכים הבאים!</h1>
  <p>הקובץ הזה יוחלף במשחק או באפליקציה שלכם.</p>
  <p>קודם ספרו למנטור מה בא לכם לבנות — הוא ידריך אתכם שלב-שלב. אל תתחילו מקוד.</p>
  <p>כשתבנו — רעננו את הדפדפן כדי לראות.</p>
</body>
</html>
